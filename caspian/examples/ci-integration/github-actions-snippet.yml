name: Validate Caspian frontmatter

on:
  pull_request:
    paths:
      - 'skills/**/*.md'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Validate Caspian frontmatter
        run: npx @caspian-dev/cli@0.1.0 validate ./skills/
        shell: bash
