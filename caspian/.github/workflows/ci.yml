name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: ./caspian
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0
          cache: pnpm
          cache-dependency-path: caspian/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint (biome)
        run: pnpm lint

      - name: Vendor-neutrality (source-level — dependency-cruiser)
        run: pnpm depcruise

      - name: Verify diagnostic codes hash
        run: pnpm verify-codes-hash

      - name: Test (vitest, all packages)
        run: pnpm test

      - name: Validate diagnostic registry against schema (ajv)
        run: pnpm ajv-validate-registry

      - name: Verify published-files snapshot
        run: pnpm verify-pack

      - name: Vendor-neutrality (lockfile-level — claude/anthropic audit)
        run: pnpm audit-vendor-neutrality

      - name: Build (tsc + copy-schemas + gen-version)
        run: pnpm build

      - name: Conformance suite (CLI dog-foods conformance/runner.mjs)
        run: pnpm conformance
